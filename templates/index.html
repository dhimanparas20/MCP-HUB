<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Hub - AI Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e14;
            --bg-card: rgba(22, 27, 34, 0.7);
            --bg-glass: rgba(22, 27, 34, 0.4);
            --border-glass: rgba(139, 148, 158, 0.15);
            --accent-primary: #58a6ff;
            --accent-secondary: #1f6feb;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --success: #3fb950;
            --error: #f85149;
            --warning: #d29922;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(88, 166, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(31, 111, 235, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
        }

        .container-main {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 1.25rem 1.5rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent-primary), #a855f7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            box-shadow: 0 4px 20px rgba(88, 166, 255, 0.3);
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-glass {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-glass:hover {
            background: var(--accent-glow);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            min-height: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--border-glass) transparent;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-glass);
            border-radius: 3px;
        }

        /* Messages */
        .message {
            display: flex;
            gap: 1rem;
            max-width: 90%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--accent-primary), #a855f7);
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .message-content {
            padding: 1rem 1.25rem;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e6edf3 !important;
        }

        .message-content * {
            color: #e6edf3 !important;
        }

        .message-content p {
            margin-bottom: 0.5rem;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content span {
            color: #e6edf3 !important;
        }

        .message-content div {
            color: #e6edf3 !important;
        }

        /* Bootstrap overrides for dark theme */
        .text-muted {
            color: #8b949e !important;
        }

        .modal-header {
            border-bottom: 1px solid var(--border-glass);
            padding: 1.25rem 1.5rem;
        }

        .modal-title {
            color: #e6edf3;
            font-weight: 600;
        }

        .message.assistant .message-content {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-top-left-radius: 4px;
        }

        .message.user .message-content {
            background: var(--accent-glow);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-top-right-radius: 4px;
        }

        /* Code Blocks */
        .message-content pre {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            padding: 1rem;
            margin: 0.75rem 0;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .message-content code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.875em;
        }

        .message-content pre code {
            background: none;
            padding: 0;
        }

        /* JSON Pretty Print */
        .json-output {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            max-height: 400px;
            overflow: auto;
            color: #e6edf3;
        }

        .json-key { color: #79c0ff; }
        .json-string { color: #a5d6ff; }
        .json-number { color: #7ee787; }
        .json-boolean { color: #ff7b72; }
        .json-null { color: #8b949e; }

        /* Lists in responses */
        .message-content ul, .message-content ol {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }

        .message-content li {
            margin: 0.25rem 0;
        }

        /* Input Area */
        .chat-input-container {
            padding: 1.25rem;
            border-top: 1px solid var(--border-glass);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 1rem 1.25rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            max-height: 150px;
            min-height: 52px;
            transition: all 0.3s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .btn-send {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent-primary), #a855f7);
            border: none;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(88, 166, 255, 0.4);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading */
        .typing-indicator {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 3rem;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .empty-subtitle {
            color: var(--text-secondary);
            max-width: 400px;
        }

        .btn-close {
            filter: invert(1);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 1050;
        }

        .toast-notification {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.75rem;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast-success { border-left: 3px solid var(--success); }
        .toast-error { border-left: 3px solid var(--error); }

        /* Responsive */
        @media (max-width: 768px) {
            .container-main {
                padding: 0.75rem;
            }

            .header {
                padding: 1rem;
            }

            .logo-text {
                font-size: 1.25rem;
            }

            .message {
                max-width: 95%;
            }

            .chat-input-wrapper {
                flex-direction: column;
            }

            .btn-send {
                width: 100%;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container-main">
        <!-- Header -->
        <header class="header glass">
            <div class="logo">
                <div class="logo-icon">
                    <i class="bi bi-robot"></i>
                </div>
                <span class="logo-text">MCP Hub</span>
            </div>
            <div class="header-status">
                <span class="status-dot"></span>
                <span id="statusText">Online</span>
            </div>
            <div class="header-actions">
                <button class="btn-glass" onclick="clearChat()">
                    <i class="bi bi-trash3"></i>
                    <span>Clear</span>
                </button>
            </div>
        </header>

        <!-- Chat Container -->
        <div class="chat-container glass">
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">💬</div>
                    <h3 class="empty-title">Start a conversation</h3>
                    <p class="empty-subtitle">Ask me anything using the MCP tools - search the web, query databases, manage files, and more!</p>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <textarea 
                        class="chat-input" 
                        id="chatInput" 
                        placeholder="Type your message... (Enter for new line, Shift+Enter to send)"
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let isLoading = false;

        // Auto-resize textarea
        function autoResize() {
            const textarea = document.getElementById('chatInput');
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        document.getElementById('chatInput').addEventListener('input', autoResize);

        // Handle keyboard input
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message || isLoading) return;

            input.value = '';
            autoResize();
            
            // Hide empty state
            document.getElementById('emptyState').style.display = 'none';
            
            // Add user message
            addMessage(message, 'user');
            
            // Show loading
            showLoading();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                hideLoading();
                
                if (data.response) {
                    addMessage(data.response, 'assistant');
                } else if (data.error) {
                    addMessage('Error: ' + data.error, 'assistant');
                    showToast('Failed to get response', 'error');
                }
            } catch (error) {
                hideLoading();
                addMessage('Connection error: ' + error.message, 'assistant');
                showToast('Failed to send message', 'error');
            }
        }

        // Add message to chat
        function addMessage(content, role) {
            const container = document.getElementById('chatMessages');
            const avatarIcon = role === 'user' ? 'bi-person' : 'bi-robot';
            const formattedContent = formatContent(content);
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">
                    <i class="bi ${avatarIcon}"></i>
                </div>
                <div class="message-content">${formattedContent}</div>
            `;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // Format content with pretty printing
        function formatContent(content) {
            // Handle JSON
            if (content.trim().startsWith('{') || content.trim().startsWith('[')) {
                try {
                    const parsed = JSON.parse(content);
                    return `<div class="json-output">${syntaxHighlight(JSON.stringify(parsed, null, 2))}</div>`;
                } catch (e) {
                    // Not valid JSON, continue with other formatting
                }
            }

            // Handle code blocks
            content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang || ''}">${escapeHtml(code.trim())}</code></pre>`;
            });

            // Handle inline code
            content = content.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Handle bold
            content = content.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // Handle line breaks
            content = content.replace(/\n/g, '<br>');

            return content;
        }

        // Syntax highlight JSON
        function syntaxHighlight(json) {
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // Escape HTML
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Show loading
        function showLoading() {
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            
            const container = document.getElementById('chatMessages');
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loadingMessage';
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `
                <div class="message-avatar">
                    <i class="bi bi-robot"></i>
                </div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;
        }

        // Hide loading
        function hideLoading() {
            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
            const loading = document.getElementById('loadingMessage');
            if (loading) loading.remove();
        }

        // Clear chat
        async function clearChat() {
            try {
                await fetch('/api/clear', { method: 'POST' });
                document.getElementById('chatMessages').innerHTML = `
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">💬</div>
                        <h3 class="empty-title">Start a conversation</h3>
                        <p class="empty-subtitle">Ask me anything using the MCP tools - search the web, query databases, manage files, and more!</p>
                    </div>
                `;
                showToast('Chat cleared', 'success');
            } catch (error) {
                showToast('Failed to clear chat', 'error');
            }
        }

        // Show toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast-notification toast-${type}`;
            toast.innerHTML = `
                <i class="bi ${type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-circle-fill'}"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        // Load chat history on page load
        async function loadChatHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                
                if (data.history && data.history.length > 0) {
                    document.getElementById('emptyState').style.display = 'none';
                    
                    data.history.forEach(item => {
                        addMessage(item.question, 'user');
                        addMessage(item.answer, 'assistant');
                    });
                    
                    // Scroll to bottom after loading history
                    const container = document.getElementById('chatMessages');
                    container.scrollTop = container.scrollHeight;
                }
            } catch (e) {
                console.error('Failed to load history:', e);
            }
        }

        loadChatHistory();

        // Check server health on load
        async function checkHealth() {
            try {
                const response = await fetch('/ping');
                if (!response.ok) throw new Error('Server offline');
                document.getElementById('statusText').textContent = 'Online';
            } catch (e) {
                document.getElementById('statusText').textContent = 'Offline';
                showToast('Server connection lost', 'error');
            }
        }

        checkHealth();
    </script>
</body>
</html>
